name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/dist/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # frontend/dist is committed to the repo (see DEPLOYMENT.md - it's a
      # pre-built static bundle, not generated here) so this workflow just
      # publishes it as-is, no build step needed.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - id: deployment
        uses: actions/deploy-pages@v4
